name: Deploy FourKit Doxygen Docs

on:
  push:
    branches:
      - neofourkit
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate Documentation
        working-directory: Minecraft.Server.FourKit
        run: doxygen Doxyfile

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Minecraft.Server.FourKit/doxygen_pages/html

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
